name: Publish Docker Images

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: ea1fuo
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/antennasim-frontend:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_USERNAME }}/antennasim-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/antennasim-backend:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_USERNAME }}/antennasim-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: nginx/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/antennasim-nginx:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_USERNAME }}/antennasim-nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Build and push all-in-one
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/antennasim:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_USERNAME }}/antennasim:latest
          cache-from: type=gha,scope=allinone
          cache-to: type=gha,mode=max,scope=allinone

      - name: Verify multi-arch manifests
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          images=(
            "${DOCKERHUB_USERNAME}/antennasim-frontend"
            "${DOCKERHUB_USERNAME}/antennasim-backend"
            "${DOCKERHUB_USERNAME}/antennasim-nginx"
            "${DOCKERHUB_USERNAME}/antennasim"
          )
          tags=("${VERSION}" "latest")

          for image in "${images[@]}"; do
            for tag in "${tags[@]}"; do
              ref="${image}:${tag}"
              echo "Inspecting ${ref}"
              verified=0

              for attempt in $(seq 1 12); do
                if inspect_output="$(docker buildx imagetools inspect "${ref}" 2>&1)"; then
                  echo "${inspect_output}"

                  if echo "${inspect_output}" | grep -q "linux/amd64" && \
                     echo "${inspect_output}" | grep -q "linux/arm64"; then
                    verified=1
                    break
                  fi
                fi

                if [ "${attempt}" -lt 12 ]; then
                  echo "Manifest not fully available yet for ${ref} (attempt ${attempt}/12), retrying..."
                  sleep 10
                fi
              done

              if [ "${verified}" -ne 1 ]; then
                echo "ERROR: ${ref} is missing required platforms after retries"
                exit 1
              fi
            done
          done
